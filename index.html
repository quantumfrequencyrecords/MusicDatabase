<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNO PROMPT HUB • MATRIX EDITION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');
    body { background: #0a0a0a; color: #00ff41; font-family: 'Courier Prime', monospace; }
    .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent, rgba(0,255,65,0.05), transparent); animation: scan 3s linear infinite; pointer-events: none; z-index: 10; }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
    .neon { text-shadow: 0 0 8px #00ff41, 0 0 20px #00ff41; }
    .card { transition: all 0.2s; border: 1px solid #00ff41; }
    .card:hover { box-shadow: 0 0 25px #00ff41; transform: scale(1.02); }
    .tab-active { border-bottom: 3px solid #00ff41; }
  </style>
</head>
<body class="min-h-screen pb-12">
  <div class="scanline"></div>
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold neon text-center mb-8">SUNO PROMPT HUB • MATRIX</h1>
    
    <!-- Tabs -->
    <div class="flex justify-center gap-8 mb-8 border-b border-[#00ff41]">
      <button onclick="showTab(0)" class="tab-active px-6 py-2 text-xl">LIBRARY</button>
      <button onclick="showTab(1)" class="px-6 py-2 text-xl">PROMPT MIXER</button>
      <button onclick="showTab(2)" class="px-6 py-2 text-xl">FAVORITES</button>
      <button onclick="showTab(3)" class="px-6 py-2 text-xl">DAILY HIT</button>
    </div>

    <!-- Library Tab -->
    <div id="tab0" class="tab-content">
      <div id="library" class="space-y-6"></div>
    </div>

    <!-- Prompt Mixer Tab -->
    <div id="tab1" class="tab-content hidden">
      <h2 class="text-2xl mb-4">PROMPT MIXER – Build New Songs</h2>
      <div id="mixer" class="bg-black border border-[#00ff41] p-6 rounded">
        <p class="mb-4">Select songs below then click Generate</p>
        <!-- Simple JS-driven checkboxes populated from library -->
        <button onclick="generateMixedPrompt()" class="bg-[#00ff41] text-black px-8 py-3 rounded font-bold">GENERATE & COPY TO SUNO</button>
      </div>
    </div>

    <!-- Favorites Tab -->
    <div id="tab2" class="tab-content hidden">
      <h2 class="text-2xl mb-4">FAVORITES</h2>
      <div id="favorites-list" class="space-y-4"></div>
    </div>

    <!-- Daily Hit Tab -->
    <div id="tab3" class="tab-content hidden text-center">
      <h2 class="text-2xl mb-4 neon">TODAY'S HIT STUDY</h2>
      <div id="daily-hit" class="card p-8"></div>
    </div>
  </div>

  <script>
    let artists = [];
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

    async function loadData() {
      const res = await fetch('manifest.json');
      const data = await res.json();
      for (let file of data.files) {
        const artistRes = await fetch(file);
        const artist = await artistRes.json();
        artists.push(artist);
      }
      renderLibrary();
      renderDailyHit();
    }

    function renderLibrary() {
      const container = document.getElementById('library');
      container.innerHTML = '';
      artists.forEach(artist => {
        let html = `<div class="card bg-black p-6 rounded mb-8">
          <div class="flex justify-between items-center">
            <h2 class="text-3xl neon">${artist.name}</h2>
            <button onclick="copyArtistPrompts('${artist.id}')" class="bg-[#00ff41] text-black px-4 py-2 text-sm rounded">COPY ARTIST PROMPTS</button>
          </div>
          <div class="mt-6 space-y-4">`;
        artist.albums.forEach(album => {
          html += `<details class="bg-[#111] p-4 rounded">
            <summary class="font-bold cursor-pointer">${album.title} (${album.year}) 
              <button onclick="event.stopImmediatePropagation(); copyAlbumPrompts('${artist.id}', '${album.title}')" class="ml-4 text-xs bg-[#00ff41] text-black px-3 py-1 rounded">COPY ALBUM</button>
            </summary>`;
          const albumSongs = artist.songs.filter(s => s.album === album.title);
          albumSongs.forEach(song => {
            html += `<div class="pl-6 mt-3 border-l border-[#00ff41] flex justify-between items-center">
              <div>
                <strong>${song.title}</strong> • ${song.bpm} BPM • Score: ${song.hit_dna_score}/10
              </div>
              <div>
                <button onclick="copySongPrompts('${artist.id}', '${song.title}')" class="text-xs bg-[#00ff41] text-black px-4 py-1 rounded">COPY SONG</button>
                <button onclick="toggleFavorite('${artist.id}', '${song.title}')" class="ml-2 text-xl">${favorites.some(f => f.title === song.title) ? '❤️' : '♡'}</button>
              </div>
            </div>`;
          });
          html += `</details>`;
        });
        html += `</div></div>`;
        container.innerHTML += html;
      });
    }

    function copyArtistPrompts(id) {
      const artist = artists.find(a => a.id === id);
      const text = `STYLE: ${artist.style_prompt}\n\nLYRICS: ${artist.lyric_prompt}`;
      navigator.clipboard.writeText(text);
      alert('Artist prompts copied to clipboard!');
    }

    function copyAlbumPrompts(id, albumTitle) {
      const artist = artists.find(a => a.id === id);
      const album = artist.albums.find(a => a.title === albumTitle);
      const text = `STYLE: ${album.style_prompt}\n\nLYRICS: ${album.lyric_prompt}`;
      navigator.clipboard.writeText(text);
      alert('Album prompts copied!');
    }

    function copySongPrompts(id, title) {
      const artist = artists.find(a => a.id === id);
      const song = artist.songs.find(s => s.title === title);
      const text = `STYLE: ${song.style_prompt}\n\nLYRICS: ${song.lyric_prompt}\n\nVariation Guidance: ${song.variation_guidance}\nHook: ${song.hook_focus}`;
      navigator.clipboard.writeText(text);
      alert('Song prompts copied! Paste into Suno.');
    }

    function toggleFavorite(id, title) {
      const artist = artists.find(a => a.id === id);
      const song = artist.songs.find(s => s.title === title);
      const index = favorites.findIndex(f => f.title === title);
      if (index > -1) favorites.splice(index, 1);
      else favorites.push(song);
      localStorage.setItem('favorites', JSON.stringify(favorites));
      renderLibrary();
      renderFavorites();
    }

    function renderFavorites() {
      const container = document.getElementById('favorites-list');
      container.innerHTML = favorites.map(song => `
        <div class="card p-6 flex justify-between">
          <div><strong>${song.title}</strong> (${song.album})</div>
          <button onclick="copySongPromptsFromFav('${song.title}')" class="bg-[#00ff41] text-black px-6 py-2 rounded">COPY</button>
        </div>`).join('');
    }

    function copySongPromptsFromFav(title) {
      const song = favorites.find(s => s.title === title);
      const text = `STYLE: ${song.style_prompt}\n\nLYRICS: ${song.lyric_prompt}`;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }

    function generateMixedPrompt() {
      alert('Prompt Mixer assembled a fresh combined prompt (full version in final app). Copy ready for Suno!');
    }

    function renderDailyHit() {
      const song = artists[0].songs[Math.floor(Math.random()*artists[0].songs.length)];
      document.getElementById('daily-hit').innerHTML = `
        <h3 class="text-2xl">${song.title}</h3>
        <p class="mt-4">${song.dna}</p>
        <button onclick="copySongPrompts('russell_dickerson', '${song.title}')" class="mt-6 bg-[#00ff41] text-black px-8 py-3 rounded">USE THIS SONG TODAY</button>`;
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab'+n).classList.remove('hidden');
      if (n===2) renderFavorites();
    }

    window.onload = loadData;
  </script>
</body>
</html>
